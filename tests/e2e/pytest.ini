[pytest]
# Run from the repo root: `pytest -c tests/e2e/pytest.ini`
# or from tests/e2e: `pytest`
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    smoke: page-reachability crawl (loads + no console errors)
    data: data-correctness assertions (UI + API)
    charts: chart structure + screenshot assertions
    flows: end-to-end mutation flows (create/delete/switch)
