[pytest]
# Run from the repo root: `pytest -c tests/e2e/pytest.ini tests/e2e`
# or from tests/e2e: `pytest`
testpaths = .
# Put tests/e2e on sys.path so `from helpers import ...` works from any
# category sub-folder; importlib mode lets same-named test modules live in
# different folders without __init__.py boilerplate or import collisions.
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --import-mode=importlib
markers =
    smoke: page-reachability crawl (loads + no console errors)
    data: data-correctness assertions (UI + API)
    charts: chart structure + screenshot assertions
    flows: end-to-end mutation flows (create/delete/switch)
    auth: authentication + session lifecycle (R1)
    tier: tier-gating / authorization, tier x screen (R2)
    caps: RLS / capacity caps, BVA on limits (R4)
    nfr: non-functional spot checks (performance / security / usability)
    visual: chart visual geometry sanity (R7)
    public: public marketing pages (landing / pricing / upgrade)
    free: free-tier + utility screens
    acceptance: cross-page acceptance scenarios (use-case)
